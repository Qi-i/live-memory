    <text x="270" y="335" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" font-weight="800" fill="#687077">视图与筛选</text>
    <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#3d454a">
