<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="840" viewBox="0 0 1440 840" role="img" aria-labelledby="title desc">
  <title id="title">回响册演示档案</title>
  <desc id="desc">使用三条虚构演出记录展示回响册的海报档案界面</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dcded7" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="7" dy="9" stdDeviation="0" flood-color="#15191c" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1440" height="840" fill="#f7f5ee"/>
  <rect width="1440" height="840" fill="url(#grid)" opacity="0.62"/>
  <path d="M0 0h330L160 840H0z" fill="#e8ff68" opacity="0.35"/>
  <path d="M1150 0h290v840H980z" fill="#91dff4" opacity="0.32"/>

  <g filter="url(#shadow)">
    <rect x="28" y="28" width="190" height="784" rx="8" fill="#fffef9" stroke="#dedfd8"/>
    <rect x="48" y="52" width="48" height="48" rx="8" fill="#dfff4f"/>
    <rect x="48" y="76" width="48" height="24" rx="0" fill="#68d9cc"/>
    <text x="72" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#101418">演</text>
    <text x="108" y="73" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="23" font-weight="800" fill="#101418">回响册</text>
    <text x="108" y="94" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#687077">Live memory</text>

    <rect x="46" y="140" width="154" height="48" rx="7" fill="#dfff4f" stroke="#c3df3e"/>
    <text x="70" y="171" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="800" fill="#101418">档案</text>
    <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#3f474c">
      <rect x="46" y="200" width="154" height="48" rx="7" fill="#fff" stroke="#dedfd8"/><text x="70" y="231">统计</text>
      <rect x="46" y="260" width="154" height="48" rx="7" fill="#fff" stroke="#dedfd8"/><text x="70" y="291">备份</text>
      <rect x="46" y="320" width="154" height="48" rx="7" fill="#fff" stroke="#dedfd8"/><text x="70" y="351">设置</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="246" y="28" width="1166" height="252" rx="8" fill="#fffef9" stroke="#d8dad5"/>
    <path d="M855 28h557v252H730z" fill="#171b20"/>
    <text x="274" y="62" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" font-weight="800" fill="#169b87">演示档案</text>
    <text x="274" y="119" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="54" font-weight="900" fill="#101418">档案</text>
    <text x="274" y="150" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="17" font-weight="700" fill="#3e464c">把票根、海报、座位图和现场高光收进一本会呼吸的演出相册。</text>
    <g font-family="Arial, 'Microsoft YaHei', sans-serif">
      <rect x="274" y="172" width="86" height="66" rx="7" fill="#fff" stroke="#dedfd8"/><text x="290" y="205" font-size="28" font-weight="900">3</text><text x="290" y="226" font-size="12" fill="#687077">场记录</text>
      <rect x="372" y="172" width="86" height="66" rx="7" fill="#fff" stroke="#dedfd8"/><text x="388" y="205" font-size="28" font-weight="900">2</text><text x="388" y="226" font-size="12" fill="#687077">已看</text>
      <rect x="470" y="172" width="86" height="66" rx="7" fill="#fff" stroke="#dedfd8"/><text x="486" y="205" font-size="28" font-weight="900">3</text><text x="486" y="226" font-size="12" fill="#687077">座城市</text>
    </g>

    <g transform="translate(955 55) rotate(-7)">
      <rect width="116" height="162" rx="7" fill="#243947" stroke="#dfff4f"/><text x="58" y="68" text-anchor="middle" font-family="Arial" font-size="20" font-weight="900" fill="#dfff4f">ECHO</text><text x="58" y="94" text-anchor="middle" font-family="Arial" font-size="20" font-weight="900" fill="#fff">TOUR</text><text x="58" y="142" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">CONCERT</text>
    </g>
    <g transform="translate(1065 66) rotate(2)">
