      <rect x="402" y="348" width="92" height="40" rx="7" fill="#dfff4f" stroke="#c3df3e"/><text x="427" y="374" fill="#101418">海报</text>
      <rect x="506" y="348" width="92" height="40" rx="7" fill="#fff" stroke="#d8dad5"/><text x="531" y="374">票夹</text>
      <rect x="610" y="348" width="110" height="40" rx="7" fill="#fff" stroke="#d8dad5"/><text x="632" y="374">纪念票根</text>
      <rect x="732" y="348" width="92" height="40" rx="7" fill="#fff" stroke="#d8dad5"/><text x="757" y="374">时间线</text>
      <rect x="836" y="348" width="92" height="40" rx="7" fill="#fff" stroke="#d8dad5"/><text x="861" y="374">票价</text>
      <rect x="940" y="348" width="92" height="40" rx="7" fill="#fff" stroke="#d8dad5"/><text x="965" y="374">汇总</text>
      <rect x="1044" y="348" width="92" height="40" rx="7" fill="#fff" stroke="#d8dad5"/><text x="1069" y="374">日历</text>
      <rect x="1148" y="348" width="116" height="40" rx="7" fill="#fff" stroke="#d8dad5"/><text x="1170" y="374">场馆/城市</text>
      <rect x="1276" y="348" width="112" height="40" rx="7" fill="#101418"/><text x="1296" y="374" fill="#fff">3 条记录</text>
    </g>
  </g>

  <g transform="translate(246 432)" filter="url(#shadow)">
    <g>
      <rect width="350" height="372" rx="8" fill="#fffef9" stroke="#d8dad5"/>
      <rect x="14" y="14" width="174" height="250" rx="7" fill="#243947"/>
      <path d="M14 198L188 72V264H14z" fill="#65dfcf"/>
      <text x="101" y="92" text-anchor="middle" font-family="Arial" font-size="27" font-weight="900" fill="#dfff4f">ECHO</text><text x="101" y="124" text-anchor="middle" font-family="Arial" font-size="27" font-weight="900" fill="#fff">TOUR</text>
      <rect x="204" y="18" width="56" height="24" rx="12" fill="#dfff4f"/><text x="232" y="35" text-anchor="middle" font-family="Arial, 'Microsoft YaHei'" font-size="12" font-weight="800">待看</text>
      <text x="204" y="78" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="21" font-weight="900" fill="#101418">回声巡演</text>
      <text x="204" y="108" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#687077">示例歌手</text>
      <text x="204" y="160" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700" fill="#3f474c">07.18 19:30</text>
      <text x="204" y="188" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#687077">海风体育馆</text>
      <rect x="14" y="280" width="322" height="1" fill="#dedfd8"/>
      <text x="18" y="316" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="900">第一场演出，等开灯。</text>
      <text x="18" y="346" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#687077">海报 · 票根 · 座位图</text>
    </g>
    <g transform="translate(370 0)">
      <rect width="350" height="372" rx="8" fill="#fffef9" stroke="#d8dad5"/>
      <rect x="14" y="14" width="174" height="250" rx="7" fill="#fa6b8a"/>
      <circle cx="101" cy="119" r="57" fill="#dfff4f"/><text x="101" y="110" text-anchor="middle" font-family="Arial" font-size="19" font-weight="900">SUMMER</text><text x="101" y="136" text-anchor="middle" font-family="Arial" font-size="19" font-weight="900">STAGE</text>
      <rect x="204" y="18" width="56" height="24" rx="12" fill="#65dfcf"/><text x="232" y="35" text-anchor="middle" font-family="Arial, 'Microsoft YaHei'" font-size="12" font-weight="800">已看</text>
      <text x="204" y="78" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="21" font-weight="900" fill="#101418">夏日双日票</text>
      <text x="204" y="108" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#687077">多艺人阵容</text>
      <text x="204" y="160" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700" fill="#3f474c">06.21 14:00</text>
      <text x="204" y="188" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#687077">夏日音乐公园</text>
      <rect x="14" y="280" width="322" height="1" fill="#dedfd8"/>
      <text x="18" y="316" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="900">两天的歌，收成一页。</text>
      <text x="18" y="346" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#687077">海报 · 阵容 · 现场照片</text>
    </g>
    <g transform="translate(740 0)">
      <rect width="426" height="372" rx="8" fill="#fffef9" stroke="#d8dad5"/>
      <rect x="14" y="14" width="174" height="250" rx="7" fill="#65dfcf"/>
      <path d="M14 188L188 62V264H14z" fill="#101418"/><text x="101" y="86" text-anchor="middle" font-family="Arial" font-size="20" font-weight="900">MIDNIGHT</text><text x="101" y="112" text-anchor="middle" font-family="Arial" font-size="20" font-weight="900">ROOM</text>
      <rect x="204" y="18" width="56" height="24" rx="12" fill="#65dfcf"/><text x="232" y="35" text-anchor="middle" font-family="Arial, 'Microsoft YaHei'" font-size="12" font-weight="800">已看</text>
      <text x="204" y="78" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="21" font-weight="900" fill="#101418">午夜小场</text>
      <text x="204" y="108" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#687077">示例乐队</text>
      <text x="204" y="160" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700" fill="#3f474c">04.12 20:00</text>
      <text x="204" y="188" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#687077">午夜 Livehouse</text>
      <rect x="14" y="280" width="398" height="1" fill="#dedfd8"/>
      <text x="18" y="316" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="900">离舞台很近，也离记忆很近。</text>
      <text x="18" y="346" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#687077">海报 · 票根 · 现场照片</text>
    </g>
  </g>
</svg>
