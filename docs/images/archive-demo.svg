    </g>
    <g transform="translate(1176 50) rotate(8)">
      <rect width="116" height="162" rx="7" fill="#5fd4c6" stroke="#fff"/><path d="M0 125L116 48V162H0z" fill="#101418"/><text x="58" y="45" text-anchor="middle" font-family="Arial" font-size="14" font-weight="900">MIDNIGHT</text><text x="58" y="65" text-anchor="middle" font-family="Arial" font-size="14" font-weight="900">ROOM</text><text x="58" y="145" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">LIVEHOUSE</text>
    </g>
